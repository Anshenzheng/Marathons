<div *ngIf="loading" class="text-center py-5">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">加载中...</span>
  </div>
</div>

<div *ngIf="!loading && !announcement" class="container py-5">
  <div class="text-center">
    <i class="bi bi-exclamation-circle display-1 text-muted mb-3"></i>
    <h4 class="text-muted">公告不存在</h4>
    <a routerLink="/" class="btn btn-primary mt-3">返回首页</a>
  </div>
</div>

<div *ngIf="!loading && announcement">
  <section class="page-header">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-lg-8">
          <div class="d-flex align-items-center mb-2">
            <span class="badge bg-info me-2" *ngIf="announcement.isTop">置顶</span>
            <span class="text-white-50">
              发布时间：{{ announcement.createdAt | date:'yyyy-MM-dd HH:mm' }}
            </span>
          </div>
          <h1 class="mb-3">{{ announcement.title }}</h1>
        </div>
      </div>
    </div>
  </section>

  <section class="py-5">
    <div class="container">
      <div class="card">
        <div class="card-body p-5">
          <div *ngIf="announcement.content" class="mb-4">
            <p class="text-muted mb-0">
              {{ announcement.content }}
            </p>
          </div>
          <div *ngIf="!announcement.content" class="text-muted">
            暂无公告内容
          </div>
        </div>
      </div>
      
      <div class="mt-4">
        <button class="btn btn-outline-primary" (click)="goBack()">
          <i class="bi bi-arrow-left me-1"></i>返回首页
        </button>
      </div>
    </div>
  </section>
</div>
