<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-lg fade-in">
        <div class="card-header text-center py-4">
          <i class="bi bi-person-circle display-4 text-white mb-2"></i>
          <h3 class="mb-0">用户登录</h3>
        </div>
        <div class="card-body p-5">
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div *ngIf="error" class="alert alert-danger" role="alert">
              {{ error }}
            </div>

            <div class="mb-4">
              <label class="form-label">用户名</label>
              <div class="input-group">
                <span class="input-group-text bg-light">
                  <i class="bi bi-person"></i>
                </span>
                <input 
                  type="text" 
                  class="form-control" 
                  formControlName="username"
                  [class.is-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
                  placeholder="请输入用户名"
                >
              </div>
              <div *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched" class="text-danger small mt-1">
                请输入用户名
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label">密码</label>
              <div class="input-group">
                <span class="input-group-text bg-light">
                  <i class="bi bi-lock"></i>
                </span>
                <input 
                  type="password" 
                  class="form-control" 
                  formControlName="password"
                  [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
                  placeholder="请输入密码"
                >
              </div>
              <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-danger small mt-1">
                请输入密码
              </div>
            </div>

            <div class="d-grid">
              <button 
                type="submit" 
                class="btn btn-primary btn-lg"
                [disabled]="loading || loginForm.invalid"
              >
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                {{ loading ? '登录中...' : '登 录' }}
              </button>
            </div>
          </form>

          <div class="text-center mt-4">
            <p class="mb-0">还没有账号？</p>
            <a routerLink="/register" class="text-decoration-none">立即注册</a>
          </div>

          <hr class="my-4">
          
          <div class="alert alert-info small" role="alert">
            <p class="mb-1"><strong>测试账号：</strong></p>
            <p class="mb-0">管理员：admin / admin123</p>
            <p class="mb-0">普通用户：zhangsan / user123</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
