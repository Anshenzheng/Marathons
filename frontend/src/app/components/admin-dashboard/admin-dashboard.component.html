<div class="container-fluid">
  <div class="row">
    <!-- 侧边栏 -->
    <div class="col-md-3 col-lg-2 bg-light p-0" style="min-height: calc(100vh - 100px);">
      <div class="p-3">
        <h5 class="fw-bold text-primary mb-4">
          <i class="bi bi-speedometer2 me-2"></i>管理后台
        </h5>
        
        <ul class="nav flex-column">
          <li class="nav-item mb-1">
            <a 
              class="nav-link" 
              [class.active]="router.url.includes('/admin/events') && !router.url.includes('edit') && !router.url.includes('create')"
              routerLink="/admin/events"
            >
              <i class="bi bi-calendar-event me-2"></i>赛事管理
            </a>
          </li>
          <li class="nav-item mb-1">
            <a 
              class="nav-link"
              [class.active]="router.url.includes('/admin/events/create')"
              routerLink="/admin/events/create"
            >
              <i class="bi bi-plus-circle me-2"></i>发布赛事
            </a>
          </li>
          <li class="nav-item mb-1">
            <a 
              class="nav-link"
              [class.active]="router.url.includes('/admin/announcements')"
              routerLink="/admin/announcements/create"
            >
              <i class="bi bi-megaphone me-2"></i>公告管理
            </a>
          </li>
          <li class="nav-item mb-1">
            <a 
              class="nav-link"
              [class.active]="router.url.includes('/admin/regulations')"
              routerLink="/admin/regulations/create"
            >
              <i class="bi bi-file-text me-2"></i>竞赛规程
            </a>
          </li>
          <li class="nav-item mb-1">
            <a 
              class="nav-link"
              [class.active]="router.url.includes('/admin/pickup-notes')"
              routerLink="/admin/pickup-notes/create"
            >
              <i class="bi bi-box-seam me-2"></i>领物须知
            </a>
          </li>
          <li class="nav-item mt-3">
            <hr>
            <a 
              class="nav-link"
              routerLink="/"
            >
              <i class="bi bi-house me-2"></i>返回前台
            </a>
          </li>
        </ul>
      </div>
    </div>

    <!-- 主内容区 -->
    <div class="col-md-9 col-lg-10 py-4">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
