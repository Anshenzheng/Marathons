<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <button class="btn btn-outline-secondary me-3" (click)="goBack()">
      <i class="bi bi-arrow-left me-1"></i>返回
    </button>
    <span class="fw-bold fs-5">
      <i class="bi bi-megaphone text-primary me-2"></i>
      {{ isEdit ? '编辑公告' : '发布公告' }}
    </span>
  </div>
</div>

<div class="card">
  <div class="card-body">
    <form [formGroup]="announcementForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">公告标题 <span class="text-danger">*</span></label>
        <input type="text" class="form-control" formControlName="title" placeholder="请输入公告标题">
        <div *ngIf="announcementForm.get('title')?.invalid && announcementForm.get('title')?.touched" class="text-danger small mt-1">
          请输入公告标题
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">公告类型</label>
        <select class="form-select" formControlName="type">
          <option value="general">通用公告</option>
          <option value="event">赛事公告</option>
        </select>
      </div>

      <div class="mb-3" *ngIf="announcementForm.get('type')?.value === 'event'">
        <label class="form-label">关联赛事</label>
        <input type="number" class="form-control" formControlName="eventId" placeholder="请输入赛事ID">
      </div>

      <div class="mb-3">
        <label class="form-label">公告内容 <span class="text-danger">*</span></label>
        <textarea class="form-control" formControlName="content" rows="10" placeholder="请输入公告内容"></textarea>
        <div *ngIf="announcementForm.get('content')?.invalid && announcementForm.get('content')?.touched" class="text-danger small mt-1">
          请输入公告内容
        </div>
      </div>

      <div class="mb-3">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" formControlName="isTop" id="isTop">
          <label class="form-check-label" for="isTop">
            置顶公告
          </label>
        </div>
      </div>

      <div class="d-flex gap-3">
        <button type="button" class="btn btn-secondary" (click)="goBack()">
          取消
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="submitting || announcementForm.invalid">
          <span *ngIf="submitting" class="spinner-border spinner-border-sm me-2"></span>
          {{ submitting ? '提交中...' : (isEdit ? '保存' : '发布') }}
        </button>
      </div>
    </form>
  </div>
</div>
