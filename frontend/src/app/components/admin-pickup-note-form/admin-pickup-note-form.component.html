<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <button class="btn btn-outline-secondary me-3" (click)="goBack()">
      <i class="bi bi-arrow-left me-1"></i>返回
    </button>
    <span class="fw-bold fs-5">
      <i class="bi bi-box-seam text-primary me-2"></i>
      发布领物须知
    </span>
  </div>
</div>

<div class="card">
  <div class="card-body">
    <form [formGroup]="pickupNoteForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">须知标题 <span class="text-danger">*</span></label>
        <input type="text" class="form-control" formControlName="title" placeholder="请输入领物须知标题">
        <div *ngIf="pickupNoteForm.get('title')?.invalid && pickupNoteForm.get('title')?.touched" class="text-danger small mt-1">
          请输入领物须知标题
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">领物日期</label>
          <input type="date" class="form-control" formControlName="pickupDate">
        </div>
        <div class="col-md-6">
          <label class="form-label">领物地点</label>
          <input type="text" class="form-control" formControlName="pickupLocation" placeholder="请输入领物地点">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">领物须知内容 <span class="text-danger">*</span></label>
        <textarea class="form-control" formControlName="content" rows="12" placeholder="请输入领物须知内容，包括领物时间、地点、流程、所需材料等信息"></textarea>
        <div *ngIf="pickupNoteForm.get('content')?.invalid && pickupNoteForm.get('content')?.touched" class="text-danger small mt-1">
          请输入领物须知内容
        </div>
      </div>

      <div class="alert alert-info small" role="alert">
        <i class="bi bi-info-circle me-2"></i>
        提示：领物须知通常包含领物时间、地点、流程、所需材料、注意事项等内容。发布后，跑者可以在赛事详情页查看。
      </div>

      <div class="d-flex gap-3">
        <button type="button" class="btn btn-secondary" (click)="goBack()">
          取消
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="submitting || pickupNoteForm.invalid">
          <span *ngIf="submitting" class="spinner-border spinner-border-sm me-2"></span>
          {{ submitting ? '提交中...' : '发布' }}
        </button>
      </div>
    </form>
  </div>
</div>
